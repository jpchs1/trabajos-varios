<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#2a1a0a"/>
      <stop offset="100%" stop-color="#3a1a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Esquinas / acentos decorativos -->
  <path d="M 0 0 L 220 0 L 0 220 Z" fill="#E63946" opacity="0.85"/>
  <path d="M 1080 0 L 860 0 L 1080 220 Z" fill="#E63946" opacity="0.85"/>
  <path d="M 0 1920 L 220 1920 L 0 1700 Z" fill="#E63946" opacity="0.85"/>
  <path d="M 1080 1920 L 860 1920 L 1080 1700 Z" fill="#E63946" opacity="0.85"/>

  <!-- Header / Marca -->
  <text x="540" y="220" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="130" fill="url(#gold)" filter="url(#shadow)">SMASH HOUSE</text>
  <text x="540" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#FFFFFF" letter-spacing="10">BURGERS · HOT DOGS · FRIES</text>

  <!-- Badge "NOW OPEN" -->
  <rect x="340" y="320" width="400" height="70" rx="35" fill="url(#redGrad)"/>
  <text x="540" y="370" text-anchor="middle" font-family="Impact, sans-serif" font-size="38" fill="#FFFFFF" letter-spacing="4">NOW OPEN — EL MONTE</text>

  <!-- Línea separadora -->
  <line x1="120" y1="430" x2="960" y2="430" stroke="url(#gold)" stroke-width="4"/>

  <!-- BURGERS -->
  <text x="80" y="500" font-family="Impact, sans-serif" font-size="52" fill="#FFD93D">BURGERS</text>

  <text x="80" y="565" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Classic Smash</text>
  <text x="1000" y="565" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$3.800</text>

  <text x="80" y="615" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Italiana <tspan font-size="22" fill="#cccccc" font-weight="normal">(palta · tomate · mayo)</tspan></text>
  <text x="1000" y="615" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$4.700</text>

  <text x="80" y="665" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Double Cheese</text>
  <text x="1000" y="665" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$5.500</text>

  <text x="80" y="715" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Bacon BBQ</text>
  <text x="1000" y="715" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$5.500</text>

  <text x="80" y="765" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Pulled Beef</text>
  <text x="1000" y="765" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$5.900</text>

  <!-- HOT DOGS -->
  <text x="80" y="855" font-family="Impact, sans-serif" font-size="52" fill="#FFD93D">HOT DOGS</text>

  <text x="80" y="920" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Italiano</text>
  <text x="1000" y="920" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$2.500</text>

  <text x="80" y="970" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Dinámico</text>
  <text x="1000" y="970" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$2.800</text>

  <text x="80" y="1020" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Bacon Cheese</text>
  <text x="1000" y="1020" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$3.200</text>

  <text x="80" y="1070" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">As Italiano</text>
  <text x="1000" y="1070" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$3.500</text>

  <!-- FRIES -->
  <text x="80" y="1160" font-family="Impact, sans-serif" font-size="52" fill="#FFD93D">FRIES</text>

  <text x="80" y="1225" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Small · Medium · Large</text>
  <text x="1000" y="1225" text-anchor="end" font-family="Arial Black, sans-serif" font-size="28" fill="#FFD93D">$1.800/$2.500/$3.500</text>

  <text x="80" y="1275" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Cheese Fries</text>
  <text x="1000" y="1275" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$3.800</text>

  <text x="80" y="1325" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold">Loaded Fries <tspan font-size="22" fill="#cccccc" font-weight="normal">(cheese + bacon)</tspan></text>
  <text x="1000" y="1325" text-anchor="end" font-family="Arial Black, sans-serif" font-size="34" fill="#FFD93D">$4.500</text>

  <!-- Family Combo -->
  <rect x="60" y="1390" width="960" height="180" rx="20" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="540" y="1450" text-anchor="middle" font-family="Impact, sans-serif" font-size="56" fill="#FFFFFF">FAMILY COMBO</text>
  <text x="540" y="1495" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#FFD93D">4 burgers + large fries + soda 1.5L</text>
  <text x="540" y="1550" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="58" fill="#FFFFFF">$19.900</text>

  <!-- CTA Pedidos -->
  <rect x="60" y="1620" width="960" height="160" rx="20" fill="#FFD93D"/>
  <text x="540" y="1685" text-anchor="middle" font-family="Impact, sans-serif" font-size="44" fill="#1a1a1a">PIDE POR WHATSAPP</text>
  <text x="540" y="1750" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="56" fill="#1a1a1a">+56 9 1234 5678</text>

  <!-- Footer -->
  <text x="540" y="1830" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="32" fill="#FFD93D">@smashhouse.elmonte</text>
  <text x="540" y="1875" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF">Thursday to Sunday · 18:00 - 23:00 · Delivery in El Monte</text>
</svg>
