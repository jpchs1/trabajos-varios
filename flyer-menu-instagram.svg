<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#3a1a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Esquinas decorativas -->
  <path d="M 0 0 L 180 0 L 0 180 Z" fill="#E63946" opacity="0.85"/>
  <path d="M 1080 1080 L 900 1080 L 1080 900 Z" fill="#E63946" opacity="0.85"/>

  <!-- Header -->
  <text x="540" y="100" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="76" fill="url(#gold)" filter="url(#shadow)">EL PAPERO</text>
  <text x="540" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" letter-spacing="6">HAMBURGUESAS · COMPLETOS · PAPAS</text>

  <!-- Línea separadora -->
  <line x1="200" y1="175" x2="880" y2="175" stroke="url(#gold)" stroke-width="3"/>

  <!-- Sección Hamburguesas -->
  <text x="80" y="230" font-family="Impact, sans-serif" font-size="38" fill="#FFD93D">HAMBURGUESAS</text>

  <text x="80" y="280" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Simple</text>
  <text x="1000" y="280" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$3.800</text>

  <text x="80" y="320" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Italiana <tspan font-size="18" fill="#cccccc" font-weight="normal">(palta · tomate · mayo)</tspan></text>
  <text x="1000" y="320" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$4.700</text>

  <text x="80" y="360" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Doble Queso</text>
  <text x="1000" y="360" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$5.500</text>

  <text x="80" y="400" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Tocino BBQ</text>
  <text x="1000" y="400" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$5.500</text>

  <text x="80" y="440" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Mechada de la Casa</text>
  <text x="1000" y="440" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$5.900</text>

  <!-- Sección Completos -->
  <text x="80" y="510" font-family="Impact, sans-serif" font-size="38" fill="#FFD93D">COMPLETOS</text>

  <text x="80" y="560" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Italiano</text>
  <text x="1000" y="560" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$2.500</text>

  <text x="80" y="600" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Dinámico</text>
  <text x="1000" y="600" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$2.800</text>

  <text x="80" y="640" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Tocino-Queso</text>
  <text x="1000" y="640" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$3.200</text>

  <text x="80" y="680" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">As Italiano</text>
  <text x="1000" y="680" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$3.500</text>

  <!-- Sección Papas -->
  <text x="80" y="750" font-family="Impact, sans-serif" font-size="38" fill="#FFD93D">PAPAS FRITAS</text>

  <text x="80" y="800" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Chica · Mediana · Grande</text>
  <text x="1000" y="800" text-anchor="end" font-family="Arial Black, sans-serif" font-size="22" fill="#FFD93D">$1.800 / $2.500 / $3.500</text>

  <text x="80" y="840" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Papas con Queso</text>
  <text x="1000" y="840" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$3.800</text>

  <text x="80" y="880" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Papas Queso + Tocino</text>
  <text x="1000" y="880" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$4.500</text>

  <!-- Combo destacado -->
  <rect x="60" y="910" width="960" height="90" rx="15" fill="#E63946"/>
  <text x="540" y="950" text-anchor="middle" font-family="Impact, sans-serif" font-size="32" fill="#FFFFFF">COMBO FAMILIA</text>
  <text x="540" y="985" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#FFD93D">4 hamburguesas + papas grandes + bebida 1.5L · <tspan font-family="Arial Black, sans-serif" font-size="28">$19.900</tspan></text>

  <!-- Footer contacto -->
  <text x="540" y="1040" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">PEDIDOS WhatsApp +569 XXXX XXXX</text>
  <text x="540" y="1068" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF">@elpapero.elmonte · Jueves a Domingo · 18:00 a 23:00 · Despacho en El Monte</text>
</svg>
