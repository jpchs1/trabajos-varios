<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#3a1a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Esquinas decorativas -->
  <path d="M 0 0 L 180 0 L 0 180 Z" fill="#E63946" opacity="0.85"/>
  <path d="M 1080 1080 L 900 1080 L 1080 900 Z" fill="#E63946" opacity="0.85"/>

  <!-- Header -->
  <text x="540" y="100" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="92" fill="url(#gold)" filter="url(#shadow)">SMASH HOUSE</text>
  <text x="540" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#FFFFFF" letter-spacing="6">BURGERS · HOT DOGS · FRIES</text>

  <!-- Línea separadora -->
  <line x1="200" y1="180" x2="880" y2="180" stroke="url(#gold)" stroke-width="3"/>

  <!-- Sección Burgers -->
  <text x="80" y="235" font-family="Impact, sans-serif" font-size="38" fill="#FFD93D">BURGERS</text>

  <text x="80" y="285" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Classic Smash</text>
  <text x="1000" y="285" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$3.800</text>

  <text x="80" y="325" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Italiana <tspan font-size="18" fill="#cccccc" font-weight="normal">(palta · tomate · mayo)</tspan></text>
  <text x="1000" y="325" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$4.700</text>

  <text x="80" y="365" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Double Cheese</text>
  <text x="1000" y="365" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$5.500</text>

  <text x="80" y="405" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Bacon BBQ</text>
  <text x="1000" y="405" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$5.500</text>

  <text x="80" y="445" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Pulled Beef</text>
  <text x="1000" y="445" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$5.900</text>

  <!-- Sección Hot Dogs -->
  <text x="80" y="515" font-family="Impact, sans-serif" font-size="38" fill="#FFD93D">HOT DOGS</text>

  <text x="80" y="565" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Italiano</text>
  <text x="1000" y="565" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$2.500</text>

  <text x="80" y="605" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Dinámico</text>
  <text x="1000" y="605" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$2.800</text>

  <text x="80" y="645" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Bacon Cheese</text>
  <text x="1000" y="645" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$3.200</text>

  <text x="80" y="685" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">As Italiano</text>
  <text x="1000" y="685" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$3.500</text>

  <!-- Sección Fries -->
  <text x="80" y="755" font-family="Impact, sans-serif" font-size="38" fill="#FFD93D">FRIES</text>

  <text x="80" y="805" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Small · Medium · Large</text>
  <text x="1000" y="805" text-anchor="end" font-family="Arial Black, sans-serif" font-size="22" fill="#FFD93D">$1.800 / $2.500 / $3.500</text>

  <text x="80" y="845" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Cheese Fries</text>
  <text x="1000" y="845" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$3.800</text>

  <text x="80" y="885" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Loaded Fries (cheese + bacon)</text>
  <text x="1000" y="885" text-anchor="end" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">$4.500</text>

  <!-- Combo destacado -->
  <rect x="60" y="915" width="960" height="90" rx="15" fill="#E63946"/>
  <text x="540" y="955" text-anchor="middle" font-family="Impact, sans-serif" font-size="32" fill="#FFFFFF">FAMILY COMBO</text>
  <text x="540" y="990" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#FFD93D">4 burgers + large fries + soda 1.5L · <tspan font-family="Arial Black, sans-serif" font-size="28">$19.900</tspan></text>

  <!-- Footer contacto -->
  <text x="540" y="1042" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="26" fill="#FFD93D">ORDER WhatsApp +56 9 1234 5678</text>
  <text x="540" y="1070" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF">@smashhouse.elmonte · Thu to Sun · 18:00 - 23:00 · Delivery in El Monte</text>
</svg>
